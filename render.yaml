services:
  - type: web
    name: questionnaire-saas
    env: node
    plan: starter
    buildCommand: npm install
    startCommand: npm run db:init && npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: APP_URL
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: PAYPAL_ENV
        value: live
      - key: PAYPAL_RECEIVER_EMAIL
        sync: false
      - key: PAYPAL_EXPECTED_AMOUNT
        value: "55.00"
      - key: PAYPAL_EXPECTED_CURRENCY
        value: USD
      - key: SEED_ADMIN_NAME
        value: Admin User
      - key: SEED_ADMIN_EMAIL
        sync: false
      - key: SEED_ADMIN_PASSWORD
        sync: false
